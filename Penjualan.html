<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Penjualan Obat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styledashboard.css">

  <style>
    /* CSS untuk menyeragamkan ukuran card */
    .row { display: flex; flex-wrap: wrap; }
    .col-md-2 { display: flex; flex-direction: column; }
    .card { border: 1px solid #ddd; border-radius: 8px; transition: 0.2s; height: 100%; display: flex; flex-direction: column; }
    .card-img-top { height: 100px; object-fit: contain; padding: 10px; cursor: pointer; }
    .card-body { padding: 12px !important; display: flex; flex-direction: column; flex-grow: 1; }
    .card-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; min-height: 35px; }
    .btn-tambah { margin-top: auto; }
    
    /* Input Jumlah */
    .qty-input { width: 60px !important; height: 35px; text-align: center; }
  </style>
</head>
<body class="ghibli-bg">
<div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block sidebar">
        <div class="sidebar-logo mb-4"><span>💊</span> GoApotek</div>
        <a href="index.html">🏠 Dashboard</a>
        <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center">
          <span>📁 Data</span>
          <i class="bi bi-chevron-down"></i>
        </a>
        <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">
          <a href="dataobat.html">💊 1. Data Obat</a>
          <a href="dokterpraktek.html">🩺 2. Dokter Praktek</a>
          <a href="rekammedis.html">📋 3. Rekam Medis</a>
          <a href="Penjualan.html" class="active">🛒 4. Penjualan</a>
          <a href="Admin.html">👤 5. Admin</a>
          <a href="operator.html">👥 6. Operator</a>
        </div>
        <a href="laporan.html">📈 Laporan</a>
        <a href="logout.html">🚪 Logout</a>
      </nav>
      
      <main class="col-md-9 col-lg-10 content py-4 px-4">
        <div class="d-flex justify-content-between align-items-center mb-4 pe-4">
          <h2 class="fw-bold">Penjualan Obat</h2>
          <div class="d-flex gap-3 align-items-center">
            <input type="text" id="cariObat" class="form-control" style="width: 300px;" placeholder="Cari obat...">
            <a href="prosescheckout.html" class="btn btn-outline-success position-relative">
              🛒 Keranjang <span id="jumlahKeranjang" class="badge bg-danger rounded-pill">0</span>
            </a>
          </div>
        </div>
        
        <div class="row g-3 pe-4" id="daftarObat"></div>
      </main>
    </div>
</div>

<script>
  const obatList = [
    { id: 1, nama: 'Paracetamol', harga: 10000, stok: 100, img: 'aset/obat1.jpg' },
    { id: 2, nama: 'Decolsin', harga: 10000, stok: 150, img: 'aset/decolsin.jpg' },
    { id: 3, nama: 'Kapsida', harga: 30000, stok: 200, img: 'aset/kapsida.webp' },
    { id: 4, nama: 'Ibuprofen', harga: 10000, stok: 250, img: 'aset/ibuprofen.png' },
    { id: 5, nama: 'Amoxicillin 500mg', harga: 4000, stok: 50, img: 'aset/amoxicillin.webp' },
    { id: 6, nama: 'Diazepam 2mg', harga: 8000, stok: 20, img:  }
  ];

  let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

  function renderObat(filter = "") {
    const daftarObat = document.getElementById("daftarObat");
    daftarObat.innerHTML = "";

    obatList.filter(o => o.nama.toLowerCase().includes(filter.toLowerCase())).forEach(obat => {
      const col = document.createElement("div");
      col.className = "col-md-2";
      col.innerHTML = `
        <div class="card">
          <a href="detailobat${obat.id}.html">
            <img src="${obat.img}" class="card-img-top" alt="${obat.nama}">
          </a>
          <div class="card-body text-center">
            <h6 class="card-title">${obat.nama}</h6>
            <p class="small text-muted m-0">Rp ${obat.harga.toLocaleString()}</p>
            <p class="small text-muted mb-2">Stok: ${obat.stok}</p>
            <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
              <span class="small">Jml:</span>
              <input type="number" id="qty-${obat.id}" class="form-control qty-input" value="1" min="1" max="${obat.stok}">
            </div>
            <button onclick="tambahKeKeranjang(${obat.id})" class="btn btn-success btn-tambah w-100">Tambah</button>
          </div>
        </div>
      `;
      daftarObat.appendChild(col);
    });
  }

  document.getElementById("cariObat").addEventListener("input", (e) => renderObat(e.target.value));

  function tambahKeKeranjang(id) {
    const obat = obatList.find(item => item.id === id);
    const qty = parseInt(document.getElementById(`qty-${id}`).value);
    keranjang.push({ ...obat, jumlah: qty });
    localStorage.setItem("keranjang", JSON.stringify(keranjang));
    document.getElementById("jumlahKeranjang").innerText = keranjang.length;
    Swal.fire({ icon: 'success', title: 'Ditambahkan', timer: 800, showConfirmButton: false });
  }

  document.addEventListener("DOMContentLoaded", () => { renderObat(); });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
