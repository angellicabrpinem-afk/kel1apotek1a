<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tambah Data Dokter - GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styledashboard.css">
  <style>
    #preview_foto {
      max-width: 220px;
      margin-top: 8px;
    }
    #preview_foto img {
      max-width: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
  </style>
</head>
<body class="ghibli-bg">
<div class="container-fluid">
    <div class="row">
      
      <!-- Sidebar Navigasi dengan Sub Menu -->
      <nav class="col-md-3 col-lg-2 d-md-block sidebar">
        <div class="sidebar-logo mb-4">
          <span>💊</span> GoApotek
        </div>
        <a href="index.html">🏠 Dashboard</a>
        
        <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center" aria-expanded="true">
          <span>📁 Data</span>
          <i class="bi bi-chevron-down" style="font-size: 0.8rem;"></i>
        </a>
        
        <!-- ISI SUB MENU (Menu Rekam Medis diset aktif dan terbuka otomatis) -->
      <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">
        <a href="dataobat.html">💊 Data Obat</a>
        <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
        <a href="riwayatkunjungan.html" class="active">📋 Rekam Medis</a>
        <a href="Penjualan.html">🛒 Penjualan</a>
        <a href="Admin.html">👤 Admin</a>
        <a href="operator.html">👥 Operator</a>
      </div>

        <a href="laporan.html">📈 Laporan</a>
        <a href="logout.html">🚪 Logout</a>
      </nav>
      
      <!-- Konten Utama Form Tambah Dokter -->
      <main class="col-md-9 col-lg-10 content py-4 px-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2>Tambah Data Dokter</h2>
        </div>
        
        <form
          id="form_dokter"
          action="simpan_dokter.php"
          method="POST"
          enctype="multipart/form-data"
          class="needs-validation"
          novalidate
        >
          <div class="row g-3">
            <div class="col-md-6">
              <label for="nama_dokter" class="form-label">Nama Dokter</label>
              <input
                id="nama_dokter"
                name="nama_dokter"
                type="text"
                class="form-control"
                placeholder="cth: dr. Ahmad Subarjo, Sp.A"
                required
              />
              <div class="invalid-feedback">Nama dokter wajib diisi.</div>
            </div>
            
            <div class="col-md-6">
              <label for="id_dokter" class="form-label">ID Dokter</label>
              <input
                id="id_dokter"
                name="id_dokter"
                type="text"
                class="form-control"
                placeholder="cth: DKT-001"
                required
              />
              <div class="invalid-feedback">ID Dokter wajib diisi.</div>
            </div>

            <div class="col-md-6">
              <label for="spesialis" class="form-label">Spesialis</label>
              <input
                id="spesialis"
                name="spesialis"
                type="text"
                class="form-control"
                placeholder="cth: Anak / Kandungan / Umum"
                required
              />
            </div>

            <div class="col-md-6">
              <label for="kontak" class="form-label">Kontak / No. Telp</label>
              <input
                id="kontak"
                name="kontak"
                type="text"
                class="form-control"
                placeholder="cth: 081234567xxx"
              />
            </div>

            <div class="col-12">
              <label for="jadwal" class="form-label">Jadwal Praktek</label>
              <input
                id="jadwal"
                name="jadwal"
                type="text"
                class="form-control"
                placeholder="cth: Senin - Jumat (08:00 - 14:00)"
              />
            </div>
            
            <div class="col-md-6">
              <label for="status" class="form-label">Status</label>
              <select id="status" name="status" class="form-select">
                <option value="Aktif">Aktif</option>
                <option value="Cuti">Cuti</option>
                <option value="Tidak Aktif">Tidak Aktif</option>
              </select>
            </div>
           
            <div class="col-md-6">
              <label for="foto_dokter" class="form-label">Foto Dokter</label>
              <input
                id="foto_dokter"
                name="foto_dokter"
                type="file"
                class="form-control"
                accept="image/*"
              />
              <div id="preview_foto"></div>
            </div>

            <div class="col-12">
              <label for="pengalaman" class="form-label">Pengalaman & Riwayat Pendidikan</label>
              <textarea
                id="pengalaman"
                name="pengalaman"
                class="form-control"
                rows="3"
                placeholder="Tuliskan detail singkat pengalaman atau lulusan universitas..."
              ></textarea>
            </div>
          </div>
          
          <div class="mt-4">
            <button type="submit" class="btn btn-success">Simpan</button>
            <a href="dokterpraktek.html" class="btn btn-secondary">Kembali</a>
          </div>
        </form>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
