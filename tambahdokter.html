<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beranda - Apotek</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">
    <link rel="stylesheet" href="style.css">'
    <link rel="stylesheet" href="styledashboard.css">
    <style>
    #preview_foto {
      max-width: 220px;
      margin-top: 8px;
    }
    #preview_foto img {
      max-width: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block sidebar">
        <div class="sidebar-logo mb-4">
          <span>💊</span> GoApotek
        </div>
        <a href="index.html">🏠 Dashboard</a>
        <a href="dataobat.html" >💊 Data Obat</a>
        <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
        <a href="Penjualan.html">🛒 Penjualan</a>
        <a href="Admin.html">👤 Admin</a>
        <a href="rekammedis.html" class="active">📋Rekam Medis</a>
        <a href="laporan.html">📈 Laporan</a>
        <a href="anggota.html">👥 Operator</a>
        <a href="logout.html">🚪 Logout</a>
      </nav>
      
      <main class="col-md-9 col-lg-10 content">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2>Tambah Data Dokter</h2>
        </div>
    <form
          id="form_obat"
          action="simpan_obat.php"
          method="POST"
          enctype="multipart/form-data"
          class="needs-validation"
          novalidate
        >
          <div class="row g-3">
            <div class="col-md-6">
              <label for="nama_obat" class="form-label">Nama Dokter</label>
              <input
                id="nama_dokter"
                name="nama_dokter"
                type="text"
                class="form-control"
                required
              />
              <div class="invalid-feedback">Spesialis</div>
            </div>
            <div class="col-md-6">
              <label for="golongan" class="form-label">ID Dokter</label>
              <input
                id="golongan"
                name="golongan"
                type="text"
                class="form-control"
                required
              />
              <div class="invalid-feedback">Pendidikan</div>
            </div>
            <div class="col-12">
              <label for="manfaat" class="form-label">Jadwal Praktek</label>
              <input
                id="manfaat"
                name="manfaat"
                type="text"
                class="form-control"
              />
            </div>
            <div class="col-md-6">
              <label for="dosis" class="form-label">Kontak</label>
              <input
                id="dosis"
                name="dosis"
                type="text"
                class="form-control"
              />
            </div>
            <div class="col-md-6">
              <label for="stok" class="form-label">Status</label>
              <input
                id="stok"
                name="stok"
                type="number"
                class="form-control"
                min="0"
                step="1"
              />
            </div>
           
            <div class="col-12">
              <label for="foto_obat" class="form-label">Foto Dokter</label>
              <input
                id="foto_obat"
                name="foto_obat"
                type="file"
                class="form-control"
                accept="image/*"
              />
              <div id="preview_foto"></div>
            </div>
            <div class="col-12">
              <label for="keterangan" class="form-label">Pengalaman</label>
              <textarea
                id="keterangan"
                name="keterangan"
                class="form-control"
                rows="3"
              ></textarea>
            </div>
          </div>
          <button type="submit" class="btn btn-success mt-4">
          <a href="dokterpraktek.html" style="color: aliceblue; text-decoration: none;">Simpan</a> 
          </button>
        </form>
      </main>
    </div>
  </div>

  <body class="ghibli-bg"></body>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
