<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Obat - GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    /* Reset & Dasar */
    body {
      background-color: #e0f7fa;
      font-size: 13px; /* Ukuran standar agar nyaman di 1366px */
      margin: 0;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 200px;
      height: 100vh;
      background-color: #cca8e9;
      padding: 20px 10px;
      z-index: 1000;
    }
    .sidebar a { display: block; padding: 10px; text-decoration: none; color: #333; }
    .sidebar a:hover { background: rgba(255,255,255,0.3); border-radius: 5px; }

    /* Pengaturan Kontainer Utama */
    .main-wrapper {
      margin-left: 200px; /* Memberi ruang untuk sidebar */
      padding: 20px;
    }

    /* Membatasi lebar konten agar konsisten di semua laptop */
    .container {
      max-width: 1140px; /* Ukuran standar Bootstrap untuk desktop */
      margin: 0 auto;
    }

    .table-container-rapi {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo mb-4 fw-bold">💊 GoApotek</div>
    <a href="index.html">🏠 Dashboard</a>
    <a href="#subMenuData" data-bs-toggle="collapse">📁 Data</a>
    <div class="collapse show" id="subMenuData" style="padding-left: 15px;">
      <a href="dataobat.html" class="fw-bold">💊 Data Obat</a>
      <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
      <a href="rekammedis.html">📋 Rekam Medis</a>
    </div>
    <a href="laporan.html">📈 Laporan</a>
    <a href="logout.html">🚪 Logout</a>
  </nav>

  <!-- Konten Utama menggunakan Container -->
  <main class="main-wrapper">
    <div class="container">
      <h2 class="fw-bold mb-4">DATA OBAT</h2>
      
      <div class="navbar bg-white mb-3 p-3 rounded shadow-sm">
        <form class="d-flex" role="search" onsubmit="event.preventDefault();">
          <input id="searchInput" class="form-control me-2" type="search" placeholder="Cari obat...">
        </form>
        <a href="tambahdata.html" class="btn btn-primary">+ Tambah Data</a>
      </div>

      <div class="table-container-rapi shadow-sm">
        <table id="obatTable" class="table table-hover">
          <thead class="table-primary">
            <tr>
              <th>No</th>
              <th>Nama Obat</th>
              <th>Jenis</th>
              <th>Kategori</th>
              <th>Stok</th>
              <th>Harga</th>
              <th class="text-center">Aksi</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>1</td><td><strong>Paracetamol</strong></td><td>Tablet</td><td>Obat Bebas</td><td>100</td><td>Rp 15.000</td><td class="text-center">👁️</td></tr>
            <tr><td>2</td><td><strong>Decolsin</strong></td><td>Tablet</td><td>Obat Bebas</td><td>150</td><td>Rp 10.000</td><td class="text-center">👁️</td></tr>
            <tr><td>3</td><td><strong>Kapsida</strong></td><td>Kapsul</td><td>Obat Bebas</td><td>200</td><td>Rp 30.000</td><td class="text-center">👁️</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById("searchInput").addEventListener("keyup", function () {
      const input = this.value.toLowerCase();
      const rows = document.querySelectorAll("#obatTable tbody tr");
      rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
      });
    });
  </script>
</body>
</html>
