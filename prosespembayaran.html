<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pembayaran</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
  /* --- GLOBAL --- */
  body {
    background-color: #f9f9f9;
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  /* --- SIDEBAR (PUTIH EMAS) --- */
  .sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    background-color: #ffffff;
    border-right: 1px solid #e0e0e0;
    padding-top: 30px;
    color: #333;
  }

  .sidebar h3 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 800;
    color: #D4AF37; /* Emas */
  }

  .sidebar a {
    display: block;
    padding: 12px 20px;
    color: #666;
    text-decoration: none;
    transition: 0.3s;
  }

  .sidebar a:hover {
    background-color: #FFF9E6;
    color: #D4AF37;
  }

  /* --- KONTEN UTAMA --- */
  .main-content {
    margin-left: 220px;
    padding: 40px;
  }

  .container-box {
    max-width: 600px;
    margin: 40px auto;
    padding: 30px;
    background-color: #ffffff;
    border-radius: 15px;
    border: 1px solid #eee;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    text-align: center;
  }

  /* --- LOADING & SUCCESS --- */
  .loading-text {
    font-size: 20px;
    color: #D4AF37;
    margin-top: 20px;
    font-weight: 600;
  }

  .spinner-border {
    width: 3rem;
    height: 3rem;
    color: #D4AF37 !important;
  }

  .success-message h2 {
    color: #D4AF37;
    margin-bottom: 15px;
  }

  /* --- STYLING STRUK THERMAL KASIR --- */
  .invoice-box {
    max-width: 380px;
    margin: 30px auto 0 auto;
    padding: 25px;
    border: 2px dashed #D4AF37; /* Border Emas */
    border-radius: 10px;
    font-family: 'Courier New', Courier, monospace;
    color: #333;
    text-align: left;
    background-color: #ffffff;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .invoice-box h4 {
    text-align: center;
    font-weight: bold;
    color: #D4AF37;
    margin-bottom: 5px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .invoice-box .title-sub {
    text-align: center;
    margin-bottom: 15px;
    color: #888;
    font-size: 12px;
  }

  .invoice-box .line {
    border-top: 1px dashed #D4AF37;
    margin: 10px 0;
  }

  .invoice-box .flex-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
  }

  .invoice-box .totals {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
    color: #D4AF37;
    font-size: 16px;
  }
</style>
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <nav class="sidebar">
      <div class="text-center mb-4 fs-3 fw-bold">
        <span>💊</span> APOTEK
      </div>
      <a href="beranda.html">🏠 Dashboard</a>
      <a href="dataobat.html">💊 Data Obat</a>
      <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
      <a href="Penjualan.html">🛒 Penjualan</a>
      <a href="Admin.html">👤 Admin</a>
      <a href="rekammedis.html" class="active">📋 Rekam Medis</a>
      <a href="laporan.html">📈 Laporan</a>
      <a href="operator.html">👥 Operator</a>
      <a href="logout.html">🚪 Logout</a>
    </nav>

    <div class="main-content">
      <div class="container-box">
        
        <div id="loadingBox">
          <div class="spinner-border text-success" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="loading-text">Pembayaran Anda sedang diproses...</p>
        </div>

        <div id="successBox" class="success-message">
          <h2>✅ Pembayaran Berhasil!</h2>
          <p>Terima kasih, pesanan Anda telah diproses.</p>
          
          <div class="invoice-box" id="printArea"></div>

          <div class="mt-4">
            <button class="btn btn-primary me-2" onclick="cetakStruk()">🖨️ Cetak Struk</button>
            <a href="beranda.html" class="btn btn-success" onclick="bersihkanKeranjang()">Kembali ke Dashboard</a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  // Mengambil data keranjang riil dari halaman sebelumnya
  let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [
    { nama: "Paracetamol 500mg", harga: 2000, jumlah: 2 },
    { nama: "OBH Combi", harga: 12000, jumlah: 1 },
    { nama: "Amoxicillin", harga: 6000, jumlah: 1 }
  ];

  // Mengisi data struk secara otomatis saat halaman pertama kali dibuka
  function buatStruk() {
    const printArea = document.getElementById("printArea");
    if (!printArea) return;

    let total = 0;
    let itemHTML = "";

    keranjang.forEach(item => {
      let subtotal = item.harga * item.jumlah;
      total += subtotal;
      itemHTML += `
        <div class="flex-row">
          <span>${item.nama}</span>
          <span>${item.jumlah} x ${item.harga.toLocaleString('id-ID')} &nbsp; ${subtotal.toLocaleString('id-ID')}</span>
        </div>
      `;
    });

    let waktuSekarang = new Date().toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });
    let infoTunai = total + 10000; 
    let infoKembalian = infoTunai - total;

    printArea.innerHTML = `
      <h4>APOTEK SEHAT SELALU</h4>
      <div class="title-sub">Struk Penjualan</div>
      
      <div class="metadata">
        <div>No. Struk: #INV-${Date.now().toString().slice(-6)}</div>
        <div>Tanggal  : ${waktuSekarang}</div>
        <div>Kasir    : Admin 1</div>
      </div>
      
      <div class="line"></div>
      
      <div class="item-list">
        ${itemHTML}
      </div>
      
      <div class="line"></div>
      
      <div class="totals">
        <div>Total: Rp ${total.toLocaleString('id-ID')}</div>
        <div>Tunai: Rp ${infoTunai.toLocaleString('id-ID')}</div>
        <div>Kembalian: Rp ${infoKembalian.toLocaleString('id-ID')}</div>
      </div>
      
      <div class="line"></div>
      
      <div class="text-center" style="margin-top: 15px;">
        <div>--- Terima kasih ---</div>
        <div>Semoga lekas sembuh 🙏</div>
      </div>
    `;
  }

  // Buat struk di latar belakang agar siap pakai tanpa delay
  document.addEventListener("DOMContentLoaded", buatStruk);

  // Transisi loading menghilang dan memunculkan struk
  setTimeout(function() {
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
    
    // Beri jeda 100ms agar halaman berganti dengan smooth sebelum memanggil pop-up print
    setTimeout(cetakStruk, 100);
  }, 1500);

  // Fungsi cetak struk instan tanpa lag
  function cetakStruk() {
    const isiStruk = document.getElementById('printArea').innerHTML;
    const gayaStruk = document.head.innerHTML;
    
    let jendelaCetak = window.open('', '', 'width=450,height=600');
    jendelaCetak.document.write(`
      <html>
        <head>
          ${gayaStruk}
          <style>
            body { background-color: #fff; padding: 10px; }
            .invoice-box { border: none; margin: 0; max-width: 100%; }
          </style>
        </head>
        <body>
          <div class="invoice-box">
            ${isiStruk}
          </div>
        </body>
      </html>
    `);
    
    jendelaCetak.document.close();
    jendelaCetak.focus();
    
    // Otomatis cetak saat window baru selesai me-load struktur HTML
    jendelaCetak.onload = function() {
      jendelaCetak.print();
      jendelaCetak.close();
    };

    // Backup pemicu jika onload bawaan browser terhambat
    setTimeout(() => {
      if(!jendelaCetak.closed) {
        jendelaCetak.print();
        jendelaCetak.close();
      }
    }, 250);
  }

  // Menghapus data belanja dari memori setelah transaksi rampung
  function bersihkanKeranjang() {
    localStorage.removeItem("keranjang");
  }
</script>

<body class="ghibli-bg"></body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
