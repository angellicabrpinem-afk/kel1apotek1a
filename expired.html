<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Obat - Apotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styledashboard.css">
  <link rel="stylesheet" href="dataobat.css">

<style>
  /* Kode sebelumnya */
  html, body {
    max-width: 100%;
    overflow-x: hidden;
  }
  
  .content {
    overflow-x: hidden;
  }

  /* KODE BARU UNTUK FONT 12PX */
  body, p, a, div, h1, h2, h3, h4, h5, h6 {
    font-size: 12px !important;
  }
</style>

</head>
<body class="ghibli-bg">

<!-- Pembungkus Utama Flexbox se-lebar layar -->
<div class="d-flex w-100 h-100">
  
  <!-- Sidebar Navigasi -->
  <nav class="sidebar p-3">
    <div class="sidebar-logo mb-4">
      <span>💊</span> GoApotek
    </div>
    <a href="index.html">🏠 Dashboard</a>
    
    <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center" aria-expanded="true">
      <span>📁 Data</span>
      <i class="bi bi-chevron-down" style="font-size: 0.8rem;"></i>
    </a>
    
    <!-- ISI SUB MENU (Menu Rekam Medis diset aktif dan terbuka otomatis) -->
      <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">
        <a href="dataobat.html" class="active">💊 Data Obat</a>
        <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
        <a href="riwayatkunjungan.html">📋 Rekam Medis</a>
        <a href="Penjualan.html">🛒 Penjualan</a>
        <a href="user.html">🧑‍🧒‍🧒 User</a>
      </div>
      
    <a href="laporan.html">📈 Laporan</a>
    <a href="logout.html">🚪 Logout</a>
  </nav>

  <!-- Area Konten Utama -->
  <main class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-semibold">📅 Obat Expired</h2>
    </div>
    
    <!-- Navbar Fitur Search & Kembali -->
    <nav class="navbar bg-body-tertiary rounded p-2 mb-3">
      <div class="container-fluid px-1">
        <form class="d-flex" role="search" onsubmit="return false;">
          <input class="form-control me-2" type="search" id="searchInput" placeholder="Search" aria-label="Search"/>
          <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
        <div class="d-flex justify-content-end">
          <a href="dataobat.html" class="btn btn-primary text-white" style="text-decoration: none;">Kembali</a>
        </div>
      </div>
    </nav>

    <!-- Pembungkus Tabel Responsif agar aman di dalam grid konten -->
    <div class="table-responsive">
      <table class="table table-bordered table-striped table-hover align-middle w-100 m-0" id="obatTable">
        <thead class="table-danger">
          <tr>
            <th style="width: 7%;">No</th>
            <th>Nama Obat</th>
            <th>Bentuk</th>
            <th>Jenis Obat</th>
            <th style="width: 12%;">Stok</th>
            <th>Tanggal Expired</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Asam Mefenamat</td>
            <td>Tablet</td>
            <td>Obat Khusus</td>
            <td>50</td>
            <td>2025-05-30</td>
          </tr>
          <tr>
            <td>2</td>
            <td>Tetrasiklin</td>
            <td>Tablet</td>
            <td>Obat Khusus</td>
            <td>20</td>
            <td>2025-06-10</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

</div>
  
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById("searchInput").addEventListener("keyup", function () {
    const input = this.value.toLowerCase();
    const rows = document.querySelectorAll("#obatTable tbody tr");
    rows.forEach(row => {
      const text = row.innerText.toLowerCase();
      row.style.display = text.includes(input) ? "" : "none";
    });
  });
</script>
</body>
</html>
