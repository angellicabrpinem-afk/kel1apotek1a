    <!-- ================= AREA KONTEN UTAMA ================= -->
    <main class="col-md-9 col-lg-10 content py-4 px-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Tambah Data Obat</h3>
        <a href="dataobat.html" class="btn btn-outline-secondary">← Kembali</a>
      </div>

      <form id="form_obat" action="simpan_obat.php" method="POST" enctype="multipart/form-data" class="needs-validation" novalidate>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="nama_obat" class="form-label">Nama Obat*</label>
            <input id="nama_obat" name="nama_obat" type="text" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label for="golongan" class="form-label">Golongan*</label>
            <input id="golongan" name="golongan" type="text" class="form-control" required />
          </div>
          <div class="col-12">
            <label for="manfaat" class="form-label">Manfaat</label>
            <input id="manfaat" name="manfaat" type="text" class="form-control" />
          </div>
          <div class="col-md-6">
            <label for="dosis" class="form-label">Dosis Pemakaian</label>
            <input id="dosis" name="dosis" type="text" class="form-control" />
          </div>
          <div class="col-md-6">
            <label for="stok" class="form-label">Stok</label>
            <input id="stok" name="stok" type="number" class="form-control" min="0" />
          </div>
          <div class="col-md-6">
            <label for="harga_beli" class="form-label">Harga Beli (Rp)*</label>
            <div class="input-group">
              <span class="input-group-text">Rp</span>
              <input id="harga_beli" name="harga_beli" type="number" class="form-control" min="0" required />
            </div>
          </div>
          <div class="col-md-6">
            <label for="harga_jual" class="form-label">Harga Jual (Rp)*</label>
            <div class="input-group">
              <span class="input-group-text">Rp</span>
              <input id="harga_jual" name="harga_jual" type="number" class="form-control" min="0" required />
            </div>
          </div>
          <div class="col-12">
            <label for="foto_obat" class="form-label">Foto Obat</label>
            <input id="foto_obat" name="foto_obat" type="file" class="form-control" accept="image/*" />
            <div id="preview_foto"></div>
          </div>
          <div class="col-12">
            <label for="keterangan" class="form-label">Keterangan Lain</label>
            <textarea id="keterangan" name="keterangan" class="form-control" rows="3"></textarea>
          </div>
        </div>
        <button type="submit" class="btn btn-success mt-4 px-4">Simpan Data</button>
      </form>
    </main>
