<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keranjang Belanja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styledashboard.css">
  <style>
  /* --- GLOBAL --- */
  body {
    background-color: #f9f9f9;
    margin: 0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  /* --- SIDEBAR (PUTIH EMAS) --- */
  .sidebar {
    height: 100vh;
    width: 240px;
    background-color: #ffffff;
    position: fixed;
    top: 0;
    left: 0;
    padding-top: 2rem;
    border-right: 1px solid #e0e0e0;
  }

  .sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 24px;
    color: #D4AF37; /* Emas */
    font-weight: 800;
  }

  .sidebar a {
    display: block;
    color: #666;
    text-decoration: none;
    padding: 12px 24px;
    font-size: 16px;
    transition: 0.3s;
  }

  .sidebar a:hover {
    background-color: #FFF9E6;
    color: #D4AF37;
  }

  /* --- KONTEN --- */
  .main-content {
    margin-left: 240px;
    padding: 3rem;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* --- KARTU KERANJANG (PUTIH EMAS) --- */
  .cart-box {
    background-color: white;
    border: 1px solid #eee;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    width: 100%;
    max-width: 400px;
  }

  .cart-box h2 {
    color: #D4AF37;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 700;
  }

  .item-name { font-weight: bold; font-size: 18px; color: #333; }
  .item-price { color: #666; margin-bottom: 15px; }

  /* --- QUANTITY CONTROL --- */
  .quantity-control { display: flex; align-items: center; margin-bottom: 20px; }

  .quantity-control button {
    width: 35px; height: 35px; font-size: 18px;
    background-color: #D4AF37;
    border: none; color: white; border-radius: 8px;
  }

  .quantity-control span { margin: 0 15px; font-size: 18px; font-weight: 600; }

  .total { font-weight: bold; font-size: 18px; color: #D4AF37; margin-top: 10px; }

  /* --- TOMBOL --- */
  .btn-bayar {
    background-color: #D4AF37; color: white; border: none;
    padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; margin-top: 20px;
  }

  .btn-kembali {
    background-color: white; color: #D4AF37; border: 2px solid #D4AF37;
    padding: 10px; width: 100%; border-radius: 8px; font-size: 15px; margin-top: 10px;
    text-decoration: none; display: block; text-align: center; font-weight: 600;
  }

  .btn-bayar:hover { background-color: #b8962d; color: white; }
  .btn-kembali:hover { background-color: #FFF9E6; }
</style>
</head>
<body>
    <div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block sidebar">
        <div class="sidebar-logo mb-4">
          <span>💊</span> GoApotek
          
        <!-- ISI SUB MENU (Menu Rekam Medis diset aktif dan terbuka otomatis) -->
      <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">
        <a href="dataobat.html">💊 Data Obat</a>
        <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
        <a href="riwayatkunjungan.html" class="active">📋 Rekam Medis</a>
        <a href="Penjualan.html">🛒 Penjualan</a>
        <a href="user.html">🧑‍🧒‍🧒 User</a>
      </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="cart-box">
      <h2>Keranjang Belanja</h2>
      <div class="item-name">Paracetamol</div>
      <div class="item-price">Rp 10.000</div>

      <div class="quantity-control">
        <button onclick="ubahJumlah(-1)">−</button>
        <span id="jumlah">1</span>
        <button onclick="ubahJumlah(1)">+</button>
      </div>

      <div class="total">Total: Rp <span id="total">10000</span></div>

      <a class="btn-kembali" href="pembayaran.html">💳 Bayar</a>
      <a class="btn-kembali" href="beranda.html">Kembali</a>
    </div>
  </div>

  <script>
    let jumlah = 1;
    const harga = 10000;

    function ubahJumlah(nilai) {
      jumlah += nilai;
      if (jumlah < 1) jumlah = 1;
      document.getElementById('jumlah').innerText = jumlah;
      document.getElementById('total').innerText = (jumlah * harga).toLocaleString('id-ID');
    }
  </script>

  <body class="ghibli-bg"></body>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
