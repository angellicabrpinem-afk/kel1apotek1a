<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keranjang Belanja</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styledashboard.css">
<style>
  /* Kode sebelumnya */
  html, body {
    max-width: 100%;
    overflow-x: hidden;
  }
  
  .content {
    overflow-x: hidden;
  }

  /* KODE BARU UNTUK FONT 12PX */
  body, p, a, div, h1, h2, h3, h4, h5, h6 {
    font-size: 12px !important;
  }
</style>
</head>
<body>
    <div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block sidebar">
        <div class="sidebar-logo mb-4">
          <span>💊</span> GoApotek
          
        <!-- ISI SUB MENU (Menu Rekam Medis diset aktif dan terbuka otomatis) -->
      <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">
        <a href="dataobat.html">💊 Data Obat</a>
        <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
        <a href="riwayatkunjungan.html" class="active">📋 Rekam Medis</a>
        <a href="Penjualan.html">🛒 Penjualan</a>
        <a href="user.html">🧑‍🧒‍🧒 User</a>
      </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="cart-box">
      <h2>Keranjang Belanja</h2>
      <div class="item-name">Paracetamol</div>
      <div class="item-price">Rp 10.000</div>

      <div class="quantity-control">
        <button onclick="ubahJumlah(-1)">−</button>
        <span id="jumlah">1</span>
        <button onclick="ubahJumlah(1)">+</button>
      </div>

      <div class="total">Total: Rp <span id="total">10000</span></div>

      <a class="btn-kembali" href="pembayaran.html">💳 Bayar</a>
      <a class="btn-kembali" href="beranda.html">Kembali</a>
    </div>
  </div>

  <script>
    let jumlah = 1;
    const harga = 10000;

    function ubahJumlah(nilai) {
      jumlah += nilai;
      if (jumlah < 1) jumlah = 1;
      document.getElementById('jumlah').innerText = jumlah;
      document.getElementById('total').innerText = (jumlah * harga).toLocaleString('id-ID');
    }
  </script>

  <body class="ghibli-bg"></body>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
