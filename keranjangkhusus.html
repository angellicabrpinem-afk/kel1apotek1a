<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keranjang - Obat Khusus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styledashboard.css">
  <link rel="stylesheet" href="keranjang.css">
  <style>
  /* Kode sebelumnya */
  html, body {
    max-width: 100%;
    overflow-x: hidden;
  }
  
  .content {
    overflow-x: hidden;
  }

  /* KODE BARU UNTUK FONT 12PX */
  body, p, a, div, h1, h2, h3, h4, h5, h6 {
    font-size: 12px !important;
  }
</style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
      <nav class="col-md-3 col-lg-2 d-md-block sidebar">
        <div class="sidebar-logo mb-4">
          <span>💊</span> APOTEK</div>
    <a href="index.html">🏠 Dashboard</a>
    <a href="dataobat.html">💊 Data Obat</a>
    <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
    <a href="Penjualan.html" class="active">🛒 Penjualan</a>
    <a href="user.html">🧑‍🧒‍🧒 User</a>
    <a href="riwayatkunjungan.html">📋 Rekam Medis</a>
    <a href="laporan.html">📈 Laporan</a>
    <a href="logout.html">🚪 Logout</a>
  </nav>

  <div class="main-content">
    <div class="cart-box">
      <h2>Keranjang Belanja</h2>

      <div class="item-name">Paracetamol</div>
      <div class="item-price">Rp 10.000</div>

      <div class="quantity-control">
        <button onclick="ubahJumlah(-1)">−</button>
        <span id="jumlah">1</span>
        <button onclick="ubahJumlah(1)">+</button>
      </div>

      <div class="total">Total: Rp <span id="total">20000</span></div>

      <div class="form-upload">
        <label for="fileSurat">Unggah Surat Edaran / Resep Dokter *</label>
        <input type="file" id="fileSurat" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
        <div class="note">* Format: PDF, JPG, atau PNG. Wajib diunggah untuk melanjutkan pembayaran.</div>
      </div>

     <a class="btn-kembali" href="prosespembayaran.html">💳 Bayar</a>
      <a class="btn-kembali" href="index.html">Kembali</a>
    
    </div>
  </div>

  <script>
    let jumlah = 1;
    const harga = 20000;

    function ubahJumlah(nilai) {
      jumlah += nilai;
      if (jumlah < 1) jumlah = 1;
      document.getElementById('jumlah').innerText = jumlah;
      document.getElementById('total').innerText = (jumlah * harga).toLocaleString('id-ID');
    }

    function prosesBayar() {
      const file = document.getElementById('fileSurat').files[0];
      if (!file) {
        alert("Mohon unggah surat edaran atau resep dari dokter terlebih dahulu.");
        return;
      }
      alert("Surat berhasil diunggah. Lanjut ke pembayaran...");
      window.location.href = "pembayaran.html";
    }
  </script>

<body class="ghibli-bg"></body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
